steps:
  # 1. 秘匿バケットから DB・JSON データをダウンロードし、所定のディレクトリに配置する
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        mkdir -p src/data
        gcloud storage cp gs://kippu-navi-build-secrets/data/*.db ./src/data/
        gcloud storage cp gs://kippu-navi-build-secrets/data/*.json ./src/data/
        mkdir -p src/app/mr/data
        gcloud storage cp gs://kippu-navi-build-secrets/mr/data/*.json ./src/app/mr/data/
        mkdir -p src/app/split/data
        gcloud storage cp gs://kippu-navi-build-secrets/split/data/*.json ./src/app/split/data/

  # 2. JSON が揃った状態で Docker ビルドを実行する
  - name: 'gcr.io/cloud-builders/docker'
    args: 
      - 'build'
      - '--secret'
      - 'id=NEXT_SERVER_ACTIONS_ENCRYPTION_KEY,env=NEXT_SERVER_ACTIONS_ENCRYPTION_KEY'
      - '-t'
      - 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/kippu-navi/kippu-navi:$SHORT_SHA'
      - '--build-arg'
      - 'NEXT_PUBLIC_GOOGLE_ANALYTICS_ID=${_NEXT_PUBLIC_GOOGLE_ANALYTICS_ID}'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_API_KEY=${_NEXT_PUBLIC_FIREBASE_API_KEY}'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${_NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN}'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_PROJECT_ID=${_NEXT_PUBLIC_FIREBASE_PROJECT_ID}'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${_NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET}'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${_NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID}'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_APP_ID=${_NEXT_PUBLIC_FIREBASE_APP_ID}'
      - '--build-arg'
      - 'NEXT_PUBLIC_POSTHOG_KEY=${_NEXT_PUBLIC_POSTHOG_KEY}'
      - '--build-arg'
      - 'NEXT_PUBLIC_POSTHOG_HOST=${_NEXT_PUBLIC_POSTHOG_HOST}'
      - '.'
    env:
      - 'DOCKER_BUILDKIT=1'
    secretEnv: ['NEXT_SERVER_ACTIONS_ENCRYPTION_KEY']

  # 3. ビルドしたイメージを Artifact Registry に Push
  - name: 'gcr.io/cloud-builders/docker'
    args: 
      - 'push'
      - 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/kippu-navi/kippu-navi:$SHORT_SHA'

  # 4. 本番の Cloud Run へデプロイする
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        gcloud run deploy kippu-navi \
          --image asia-northeast1-docker.pkg.dev/$PROJECT_ID/kippu-navi/kippu-navi:$SHORT_SHA \
          --region asia-northeast1
        gcloud run services update-traffic kippu-navi \
          --to-latest \
          --region asia-northeast1

  # 5. Cloud Runデプロイ成功後にCloudflareのキャッシュをパージする
  - name: 'gcr.io/cloud-builders/curl'
    entrypoint: 'bash'
    args:
    - '-c'
    - |
      echo "Purging Cloudflare cache..."
      response=$(curl -s -X POST "https://api.cloudflare.com/client/v4/zones/$$ZONE_ID/purge_cache" \
        -H "Authorization: Bearer $$API_TOKEN" \
        -H "Content-Type: application/json" \
        --data '{"purge_everything":true}')
      echo "$response"
      if ! echo "$response" | grep -q '"success":true'; then
        echo "Cloudflare cache purge failed!"
        exit 1
      fi
    secretEnv: ['ZONE_ID', 'API_TOKEN']

# 正常終了の条件として、指定したイメージが正しくビルド・プッシュされたか検証する
images:
  - 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/kippu-navi/kippu-navi:$SHORT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY

# Secret Managerから環境変数として値を読み込む設定
availableSecrets:
  secretManager:
  - versionName: projects/$PROJECT_ID/secrets/CLOUDFLARE_ZONE_ID/versions/latest
    env: 'ZONE_ID'
  - versionName: projects/$PROJECT_ID/secrets/CLOUDFLARE_API_TOKEN/versions/latest
    env: 'API_TOKEN'
  - versionName: projects/$PROJECT_ID/secrets/NEXT_SERVER_ACTIONS_ENCRYPTION_KEY/versions/latest
    env: 'NEXT_SERVER_ACTIONS_ENCRYPTION_KEY'