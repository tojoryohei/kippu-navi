name: Deploy API to Cloud Run

on:
  push:
    branches:
      - main
    paths:
      - 'split-pass-api/**'
      - '.github/workflows/deploy-api.yml'
  workflow_dispatch:

env:
  PROJECT_ID: 'bubbly-trail-470023-e4'
  REGION: 'asia-northeast1'
  SERVICE_NAME: 'split-pass-api'
  GAR_REPO: 'cloud-run-source-deploy' 

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: '${{ secrets.WIF_PROVIDER }}'
          service_account: '${{ secrets.SA_EMAIL }}'
          token_format: 'access_token'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Login to Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGION }}-docker.pkg.dev
          username: 'oauth2accesstoken'
          password: '${{ steps.auth.outputs.access_token }}'

      - name: Get precomputed_server.bin Metadata
        id: gcs-meta
        run: |
          MD5=$(gsutil stat gs://kippu-navi-build-secrets/data/precomputed_server.bin | grep "Hash (md5):" | awk '{print $3}')
          CLEAN_MD5=$(echo "$MD5" | tr -dc 'a-zA-Z0-9')
          echo "md5=$CLEAN_MD5" >> $GITHUB_OUTPUT

      - name: Cache Precomputed Server Binary
        id: cache-bin
        uses: actions/cache@v4
        with:
          path: ./split-pass-api/internal/graph/data/precomputed_server.bin
          key: precomputed-server-${{ steps.gcs-meta.outputs.md5 }}

      - name: Download Precomputed Server Binary
        if: steps.cache-bin.outputs.cache-hit != 'true'
        run: |
          gsutil cp gs://kippu-navi-build-secrets/data/precomputed_server.bin ./split-pass-api/internal/graph/data/

      - name: Build and Push Docker Image
        run: |
          IMAGE_PATH="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.GAR_REPO }}/${{ env.SERVICE_NAME }}:${{ github.sha }}"
          
          docker build -t $IMAGE_PATH ./split-pass-api
          docker push $IMAGE_PATH

      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.GAR_REPO }}/${{ env.SERVICE_NAME }}:${{ github.sha }}
          flags: '--allow-unauthenticated'

      - name: Show Output URL
        run: echo "Deployed URL - ${{ steps.deploy.outputs.url }}"