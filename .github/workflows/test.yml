name: CI

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  id-token: write

jobs:
  # ---------------------------------------------------
  # 1. Lintジョブ: コードの書き方や潜在的なバグをチェック
  # ---------------------------------------------------
  lint:
    name: Run ESLint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Setup Takumi Guard
        uses: flatt-security/setup-takumi-guard-npm@v1

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  # ---------------------------------------------------
  # 2. Knipジョブ: 未使用のコードや依存関係をチェック
  # ---------------------------------------------------
  knip:
    name: Run Knip
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Setup Takumi Guard
        uses: flatt-security/setup-takumi-guard-npm@v1

      - name: Install dependencies
        run: npm ci

      - name: Run Knip
        run: npx knip

  # ---------------------------------------------------
  # 3. Testジョブ: 運賃計算ロジックなどのユニットテストを実行
  # ---------------------------------------------------
  test:
    name: Run Vitest
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Setup Takumi Guard
        uses: flatt-security/setup-takumi-guard-npm@v1

      # DB・JSONファイルを保存するディレクトリを作成
      - name: Create data directories
        run: |
          mkdir -p src/data
          mkdir -p src/app/mr/data
          mkdir -p src/app/split/data

      # GitHub Actionsのキャッシュ機能でJSONデータを復元
      - name: Cache data
        id: cache
        uses: actions/cache@v4
        with:
          path: |
            src/data/*.db
            src/data/*.json
            src/app/mr/data/*.json
            src/app/split/data/*.json
          key: kippu-navi-data-v20260516-${{ hashFiles('.github/workflows/test.yml') }}

      # キャッシュが無い、かつDependabotではない場合のみGCP認証
      - name: Authenticate to Google Cloud
        if: steps.cache.outputs.cache-hit != 'true' && github.actor != 'dependabot[bot]'
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_CREDENTIALS }}'

      # キャッシュが無い、かつDependabotではない場合のみSDKセットアップ
      - name: Set up Cloud SDK
        if: steps.cache.outputs.cache-hit != 'true' && github.actor != 'dependabot[bot]'
        uses: google-github-actions/setup-gcloud@v2

      # キャッシュが無い、かつDependabotではない場合のみGCSからダウンロード
      - name: Download data from private GCS
        if: steps.cache.outputs.cache-hit != 'true' && github.actor != 'dependabot[bot]'
        run: |
          gsutil -m cp gs://kippu-navi-build-secrets/data/*.db ./src/data/
          gsutil -m cp gs://kippu-navi-build-secrets/data/*.json ./src/data/
          gsutil -m cp gs://kippu-navi-build-secrets/mr/data/*.json ./src/app/mr/data/
          gsutil -m cp gs://kippu-navi-build-secrets/split/data/*.json ./src/app/split/data/

      - name: Install dependencies
        run: npm ci

      # データが存在する（キャッシュヒットした、またはDependabot以外でDLされた）場合のみテストを実行
      - name: Run Vitest
        if: steps.cache.outputs.cache-hit == 'true' || github.actor != 'dependabot[bot]'
        run: npm run test