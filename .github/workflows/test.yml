name: CI

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  id-token: write

jobs:
  # ===================================================
  # [Frontend] Node.js 環境のジョブ
  # ===================================================
  lint:
    name: Run ESLint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Setup Takumi Guard
        uses: flatt-security/setup-takumi-guard-npm@v1

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  knip:
    name: Run Knip
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Setup Takumi Guard
        uses: flatt-security/setup-takumi-guard-npm@v1

      - name: Install dependencies
        run: npm ci

      - name: Run Knip
        run: npx knip

  test:
    name: Run Vitest
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Setup Takumi Guard
        uses: flatt-security/setup-takumi-guard-npm@v1

      - name: Create data directories
        run: |
          mkdir -p src/data
          mkdir -p src/app/mr/data
          mkdir -p src/app/split/data

      - name: Cache data
        id: cache
        uses: actions/cache@v4
        with:
          path: |
            src/data/*.db
            src/data/*.json
            src/app/mr/data/*.json
            src/app/split/data/*.json
          key: kippu-navi-data-v20260526-${{ hashFiles('.github/workflows/test.yml') }}

      - name: Authenticate to Google Cloud
        if: steps.cache.outputs.cache-hit != 'true' && github.actor != 'dependabot[bot]'
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_CREDENTIALS }}'

      - name: Set up Cloud SDK
        if: steps.cache.outputs.cache-hit != 'true' && github.actor != 'dependabot[bot]'
        uses: google-github-actions/setup-gcloud@v2

      - name: Download data from private GCS
        if: steps.cache.outputs.cache-hit != 'true' && github.actor != 'dependabot[bot]'
        run: |
          gsutil -m cp gs://kippu-navi-build-secrets/data/*.db ./src/data/
          gsutil -m cp gs://kippu-navi-build-secrets/data/*.json ./src/data/
          gsutil -m cp gs://kippu-navi-build-secrets/mr/data/*.json ./src/app/mr/data/
          gsutil -m cp gs://kippu-navi-build-secrets/split/data/*.json ./src/app/split/data/

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest
        if: steps.cache.outputs.cache-hit == 'true' || github.actor != 'dependabot[bot]'
        run: npm run test

  # ===================================================
  # [Backend] Go 環境のジョブ
  # ===================================================
  go-lint:
    name: Run golangci-lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: false

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m

  go-test:
    name: Run Go Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Create data directories
        run: |
          mkdir -p src/data

      - name: Cache data
        id: cache
        uses: actions/cache@v4
        with:
          path: |
            src/data/routes.json
          key: kippu-navi-routes-data-v20260526-${{ hashFiles('.github/workflows/test.yml') }}

      - name: Authenticate to Google Cloud
        if: steps.cache.outputs.cache-hit != 'true' && github.actor != 'dependabot[bot]'
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_CREDENTIALS }}'

      - name: Set up Cloud SDK
        if: steps.cache.outputs.cache-hit != 'true' && github.actor != 'dependabot[bot]'
        uses: google-github-actions/setup-gcloud@v2

      - name: Download data from private GCS
        if: steps.cache.outputs.cache-hit != 'true' && github.actor != 'dependabot[bot]'
        run: |
          gsutil -m cp gs://kippu-navi-build-secrets/data/routes.json ./src/data/

      - name: Run Go Test
        run: go test -v -race ./...