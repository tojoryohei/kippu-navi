name: Unit Tests

on:
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      # 1. GCPへの認証 (GitHub Secretsに登録したJSONキーを使用)
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_CREDENTIALS }}'

      # 2. gcloud / gsutil コマンドのセットアップ
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # 3. 秘匿バケットからJSONデータをダウンロードし、所定のディレクトリに配置
      - name: Download JSON data from private GCS
        run: |
          mkdir -p src/data
          gsutil -m cp gs://kippu-navi-build-secrets/data/*.json ./src/data/
          
          mkdir -p src/app/mr/data
          gsutil -m cp gs://kippu-navi-build-secrets/mr/data/*.json ./src/app/mr/data/
          
          mkdir -p src/app/split/data
          gsutil -m cp gs://kippu-navi-build-secrets/split/data/*.json ./src/app/split/data/

      # 4. パッケージのインストール
      - name: Install dependencies
        run: npm ci

      # 5. テストの実行
      - name: Run Vitest
        run: npm run test